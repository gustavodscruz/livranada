openapi: 3.0.1
info:
  title: Livranada API
  version: 1.0.0

tags:
  - name: UserController
    description: Operações relacionadas a usuários (registro, login, perfil)

paths:
  /auth/users/register:
    post:
      tags:
        - AuthController
      summary: Registra um novo usuário
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"
      responses:
        '201':
          description: "usuário criado com sucesso"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        '400':
          description: "requisição inválida"
        '412':
          description: "pré-condição falhou (ex: username ou email já existe)"
  /auth/users/login:
    post:
      tags:
        - AuthController
      summary: Realiza login de um usuário
      operationId: loginUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
      responses:
        '200':
          description: login bem-sucedido
          content:
              application/json:
                schema:
                    $ref: "#/components/schemas/TokenResponse"
        '401':
          description: credenciais inválidas
        '412':
          description: "pré-condição falhou (ex: username ou email já existe)"

  /users/update-profile:
    put:
      tags:
        - UserController
      summary: Atualiza o perfil do usuário
      operationId: updateUserProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        '200':
          description: perfil atualizado com sucesso
        '400':
          description: requisição inválida
        '401':
          description: usuário não autenticado
        '412':
          description: "pré-condição falhou (ex: username ou email já existe)"
  /users/profile:
    get:
      tags:
        - UserController
      summary: Retorna o perfil do usuário
      operationId: getUserProfile
      responses:
        '200':
          description: perfil retornado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        '401':
          description: usuário não autenticado
  /hello:
    get:
      summary: Retorna um hello world
      operationId: getHello
      responses:
        '200':
          description: sucesso
          content:
            application/json:
              schema:
                type: string

components:
  schemas:
    UserRegisterRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 8
          pattern: ^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$
    UserUpdateRequest:
      type: object
      allOf:
        - $ref: "#/components/schemas/UserRegisterRequest"
    UserLoginRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
    ProfileResponse:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        numberOfComments:
          type: integer
        communities:
          type: array
          items:
            $ref: "#/components/schemas/CommunityResponse"
    CommunityResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        iconImage:
          type: string
    TokenResponse:
      type: object
      properties:
        token:
          type: string
